<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio - Video Editor</title>

<style>

html{scroll-behavior:smooth;}

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
color:#333;
transition:0.4s;
}

body.dark{
background:#0f172a;
color:white;
}

/* NAV */
nav{
background:#111;
padding:15px;
display:flex;
justify-content:center;
gap:30px;
position:sticky;
top:0;
z-index:999;
}

nav a{
color:white;
text-decoration:none;
font-size:18px;
}

nav a:hover{color:#00d9ff;}

/* DARK MODE */
.dark-btn{
position:fixed;
right:20px;
bottom:20px;
background:#111;
color:white;
border:none;
padding:12px 15px;
border-radius:30px;
cursor:pointer;
}

/* HERO */
.hero{
min-height:80vh;
display:flex;
align-items:center;
justify-content:center;
gap:60px;
padding:60px 10%;
flex-wrap:wrap;
}

.profile-img{
width:300px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

.hero-info h1{font-size:40px;}

.btn{
display:inline-block;
margin-top:20px;
padding:12px 25px;
background:#00d9ff;
color:black;
border-radius:30px;
text-decoration:none;
}

/* SECTION */
section{padding:80px 10%;}

/* CARD */
.card{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

body.dark .card{background:#1e293b;}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.gallery img{
width:100%;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* VIDEO */
.video-box{cursor:pointer;}

/* VIDEO POPUP */
.video-popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.video-popup iframe{
width:80%;
height:80%;
border:none;
border-radius:10px;
}

/* CLOSE */
.close{
position:absolute;
top:30px;
right:50px;
font-size:40px;
color:white;
cursor:pointer;
}

/* ANIMATION */
.fade{
opacity:0;
transform:translateY(30px);
transition:1s;
}

.fade.show{
opacity:1;
transform:translateY(0);
}

footer{
background:#111;
color:white;
text-align:center;
padding:30px;
}

</style>
</head>

<body>

<nav>
<a href="#home">หน้าแรก</a>
<a href="#portfolio">ผลงาน</a>
<a href="#contact">ติดต่อ</a>
</nav>

<section id="home" class="hero fade">

<img src="Portfolio.jpg" class="profile-img">

<div class="hero-info">
<h1>Preeyanuch Beawbungkerd</h1>
<p>Video Editor / Graphic Designer</p>

<a href="#portfolio" class="btn">🎬 View Portfolio</a>
</div>

</section>

<!-- PORTFOLIO -->
<section id="portfolio" class="fade">

<h2>ผลงานวิดีโอ</h2>

<div class="gallery">

<!-- VIDEO 1 -->
<div class="video-box" onclick="openVideo('1AbCdEf123456')">
<img src="thumb1.jpg">
</div>

<!-- VIDEO 2 -->
<div class="video-box" onclick="openVideo('2XyZaBc987654')">
<img src="thumb2.jpg">
</div>

</div>

</section>

<!-- CONTACT -->
<section id="contact" class="fade">
<div class="card">
<p>📞 08X-XXX-XXXX</p>
<p>📧 yourmail@email.com</p>
</div>
</section>

<footer>
© Portfolio Website
</footer>

<!-- VIDEO POPUP -->
<div id="videoPopup" class="video-popup">
<span class="close" onclick="closeVideo()">✖</span>
<iframe id="videoFrame" allowfullscreen></iframe>
</div>

<button class="dark-btn" onclick="darkMode()">🌙</button>

<script>

function darkMode(){
document.body.classList.toggle("dark");
}

/* ANIMATION */
const faders=document.querySelectorAll(".fade");

window.addEventListener("scroll",()=>{
faders.forEach(el=>{
const top=el.getBoundingClientRect().top;
if(top<window.innerHeight-100){
el.classList.add("show");
}
});
});

/* GOOGLE DRIVE VIDEO */
function openVideo(id){
document.getElementById("videoPopup").style.display="flex";
document.getElementById("videoFrame").src=
"https://drive.google.com/file/d/"+id+"/preview";
}

function closeVideo(){
document.getElementById("videoPopup").style.display="none";
document.getElementById("videoFrame").src="";
}

</script>

</body>
</html>
