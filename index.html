<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio - Video Editor</title>

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
color:#333;
transition:0.4s;
}

/* DARK MODE */

body.dark{
background:#0f172a;
color:white;
}

/* NAV */

nav{
background:#111;
padding:15px;
display:flex;
justify-content:center;
gap:30px;
position:sticky;
top:0;
z-index:999;
}

nav a{
color:white;
text-decoration:none;
font-size:18px;
}

nav a:hover{
color:#00d9ff;
}

/* Dark Button */

.dark-btn{
position:fixed;
right:20px;
bottom:20px;
background:#111;
color:white;
border:none;
padding:12px 15px;
border-radius:30px;
cursor:pointer;
font-size:16px;
}

/* HERO */

.hero{
min-height:80vh;
display:flex;
align-items:center;
justify-content:center;
gap:60px;
padding:60px 10%;
flex-wrap:wrap;
}

.profile-img{
width:300px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

.hero-info h1{
font-size:40px;
margin-bottom:10px;
}

.hero-info p{
font-size:18px;
line-height:1.6;
}

/* BUTTON */

.btn{
display:inline-block;
margin-top:20px;
padding:12px 25px;
background:#00d9ff;
color:black;
border-radius:30px;
text-decoration:none;
font-weight:bold;
}

.btn:hover{
transform:scale(1.05);
}

/* SECTION */

section{
padding:80px 10%;
}

/* CARD */

.card{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
transition:0.4s;
}

body.dark .card{
background:#1e293b;
}

/* SKILL */

.skills span{
background:#00d9ff;
padding:7px 14px;
border-radius:20px;
margin:5px;
display:inline-block;
color:black;
font-size:14px;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.gallery img{
width:100%;
border-radius:10px;
cursor:pointer;
transition:0.4s;
}

.gallery img:hover{
transform:scale(1.08);
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* VIDEO */

.video iframe{
width:100%;
height:220px;
border:none;
border-radius:10px;
}

/* LIGHTBOX */

.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.lightbox img{
max-width:90%;
max-height:80%;
border-radius:10px;
}

/* ปุ่มกากบาท */

.close-btn{
position:absolute;
top:30px;
right:40px;
font-size:40px;
color:white;
text-decoration:none;
font-weight:bold;
}

.close-btn:hover{
color:#ff4d4d;
}

.lightbox:target{
display:flex;
}

/* ANIMATION */

.fade{
opacity:0;
transform:translateY(30px);
transition:1s;
}

.fade.show{
opacity:1;
transform:translateY(0);
}

/* FOOTER */

footer{
background:#111;
color:white;
text-align:center;
padding:30px;
}

</style>
</head>

<body>

<button class="dark-btn" onclick="darkMode()">🌙</button>

<script>

/* DARK MODE */

function darkMode(){
document.body.classList.toggle("dark");
}

/* SCROLL ANIMATION */

const faders=document.querySelectorAll(".fade");

window.addEventListener("scroll",()=>{

faders.forEach(el=>{

const top=el.getBoundingClientRect().top;

if(top<window.innerHeight-100){
el.classList.add("show");
}

});

});

</script>
