<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio - Video Editor</title>

<style>

/* Smooth Scroll */
html{scroll-behavior:smooth;}

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
color:#333;
transition:0.4s;
}

body.dark{
background:#0f172a;
color:white;
}

/* NAV */

nav{
background:#111;
padding:15px;
display:flex;
justify-content:center;
gap:30px;
position:sticky;
top:0;
z-index:999;
}

nav a{
color:white;
text-decoration:none;
font-size:18px;
}

nav a:hover{
color:#00d9ff;
}

/* Dark Button */

.dark-btn{
position:fixed;
right:20px;
bottom:20px;
background:#111;
color:white;
border:none;
padding:12px 15px;
border-radius:30px;
cursor:pointer;
font-size:16px;
}

/* HERO */

.hero{
min-height:80vh;
display:flex;
align-items:center;
justify-content:center;
gap:60px;
padding:60px 10%;
flex-wrap:wrap;
}

.profile-img{
width:300px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

.hero-info h1{
font-size:40px;
margin-bottom:10px;
}

.hero-info p{
font-size:18px;
line-height:1.6;
}

/* BUTTON */

.btn{
display:inline-block;
margin-top:20px;
padding:12px 25px;
background:#00d9ff;
color:black;
border-radius:30px;
text-decoration:none;
font-weight:bold;
}

.btn:hover{
transform:scale(1.05);
}

/* SECTION */

section{
padding:80px 10%;
}

/* CARD */

.card{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
transition:0.4s;
}

body.dark .card{
background:#1e293b;
}

/* SKILL */

.skills span{
background:#00d9ff;
padding:7px 14px;
border-radius:20px;
margin:5px;
display:inline-block;
color:black;
font-size:14px;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.gallery img{
width:100%;
border-radius:10px;
cursor:pointer;
transition:0.4s;
}

.gallery img:hover{
transform:scale(1.08);
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* VIDEO */

.video iframe{
width:100%;
height:200px;
border:none;
border-radius:10px;
}

/* NETFLIX VIDEO POPUP */

.video-card{
cursor:pointer;
position:relative;
}

.video-card img{
width:100%;
border-radius:10px;
}

.play-btn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:40px;
color:white;
}

/* POPUP */

.video-popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.video-popup iframe{
width:80%;
height:70%;
border:none;
border-radius:10px;
}

.close-video{
position:absolute;
top:30px;
right:40px;
font-size:40px;
color:white;
cursor:pointer;
}

/* SLIDER */

.slider{
position:relative;
overflow:hidden;
}

.slide-track{
display:flex;
transition:0.5s;
}

.slide-track img{
width:100%;
max-width:300px;
margin-right:20px;
border-radius:10px;
}

.slide-btn{
position:absolute;
top:40%;
background:#111;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
}

.prev{left:0;}
.next{right:0;}

/* MOBILE */

@media(max-width:768px){

.hero{
flex-direction:column;
text-align:center;
}

.profile-img{
width:200px;
}

.video-popup iframe{
width:95%;
height:40%;
}

}

/* ANIMATION */

.fade{
opacity:0;
transform:translateY(30px);
transition:1s;
}

.fade.show{
opacity:1;
transform:translateY(0);
}

/* FOOTER */

footer{
background:#111;
color:white;
text-align:center;
padding:30px;
}

</style>
</head>

<body>

<nav>

<a href="#home">หน้าแรก</a>
<a href="#about">เกี่ยวกับ</a>
<a href="#work">ประวัติการทำงาน</a>
<a href="#portfolio">ผลงาน</a>
<a href="#contact">ติดต่อ</a>

</nav>

<section id="home" class="hero fade">

<img src="Portfolio.jpg" class="profile-img">

<div class="hero-info">

<h1>Preeyanuch Beawbungkerd</h1>

<p>ชื่อเล่น : Nuch </p>

<p>
Video Editor / Graphic Designer  
ผู้สร้างสรรค์สื่อดิจิทัล วิดีโอ และภาพคอนเทนต์
</p>

<a href="resume.pdf" target="_blank" class="btn">📄 Download Resume</a>
<a href="#portfolio" class="btn">🎬 View Portfolio</a>

</div>

</section>

<section id="portfolio">

<h2>ผลงานภาพ</h2>

<div class="slider">

<button class="slide-btn prev" onclick="slide(-1)">❮</button>

<div class="slide-track" id="slider">

<img src="Aira-2.jpg">
<img src="Alice Summer.jpg">
<img src="Alice Valentine สีขาว2 .jpg">
<img src="Chrlotte Chainese.jpg">

</div>

<button class="slide-btn next" onclick="slide(1)">❯</button>

</div>

<br><br>

<h2>ผลงานวิดีโอ</h2>

<div class="gallery">

<div class="video-card" onclick="openVideo('https://drive.google.com/file/d/FILE_ID/preview')">
<img src="video-cover1.jpg">
<div class="play-btn">▶</div>
</div>

<div class="video-card" onclick="openVideo('https://www.youtube.com/embed/VIDEOID')">
<img src="video-cover2.jpg">
<div class="play-btn">▶</div>
</div>

</div>

</section>

<div class="video-popup" id="videoPopup">

<div class="close-video" onclick="closeVideo()">✕</div>

<iframe id="videoFrame"></iframe>

</div>

<footer>
© Portfolio Website
</footer>

<button class="dark-btn" onclick="darkMode()">🌙</button>

<script>

/* DARK MODE */

function darkMode(){
document.body.classList.toggle("dark");
}

/* SCROLL ANIMATION */

const faders=document.querySelectorAll(".fade");

window.addEventListener("scroll",()=>{
faders.forEach(el=>{
const top=el.getBoundingClientRect().top;
if(top<window.innerHeight-100){
el.classList.add("show");
}
});
});

/* VIDEO POPUP */

function openVideo(link){

document.getElementById("videoPopup").style.display="flex";
document.getElementById("videoFrame").src=link;

}

function closeVideo(){

document.getElementById("videoPopup").style.display="none";
document.getElementById("videoFrame").src="";

}

/* SLIDER */

let position=0;

function slide(dir){

const slider=document.getElementById("slider");

position += dir*320;

slider.style.transform="translateX(-"+position+"px)";

}

</script>

</body>
</html>
